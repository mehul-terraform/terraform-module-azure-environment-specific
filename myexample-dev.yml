trigger:
  branches:
    include:
      - main

variables:
- group: myexample-iac-terraform-dev   # Azure DevOps Variable Group

- name: TF_VERSION
  value: '1.6.6'

- name: Environments
  value: 'dev'

stages:

# -------------------------
# STAGE 1: VALIDATE + PLAN
# -------------------------
- stage: Plan
  displayName: "Terraform Plan - dev"
  jobs:
  - job: terraform_plan
    displayName: "Run Terraform Plan"
    pool:
      vmImage: 'ubuntu-latest'
    
    steps:
    - checkout: self

    # Install Terraform
    - task: ms-devlabs.custom-terraform-tasks.custom-terraform-installer-task.TerraformInstaller@1
      inputs:
        terraformVersion: $(TF_VERSION)

    # Terraform Init
    - task: charleszipp.azure-pipelines-tasks-terraform.azure-pipelines-tasks-terraform-cli.TerraformCLI@1
      displayName: "Terraform Init"
      inputs:
        command: 'init'
        workingDirectory: 'Environments/$(Environments)'
        backendType: 'azurerm'
        backendServiceArm: 'MyExample-Azure'

    # Terraform Format Check
    - task: charleszipp.azure-pipelines-tasks-terraform.azure-pipelines-tasks-terraform-cli.TerraformCLI@1
      displayName: "Terraform Format Check"
      inputs:
        command: 'fmt'
        workingDirectory: 'Environments/$(Environments)'
        commandOptions: '-check'

    # Terraform Validate
    - task: charleszipp.azure-pipelines-tasks-terraform.azure-pipelines-tasks-terraform-cli.TerraformCLI@1
      displayName: "Terraform Validate"
      inputs:
        command: 'validate'
        workingDirectory: 'Environments/$(Environments)'

    # Terraform Plan
    - task: charleszipp.azure-pipelines-tasks-terraform.azure-pipelines-tasks-terraform-cli.TerraformCLI@1
      displayName: "Terraform Plan"
      inputs:
        command: 'plan'
        workingDirectory: 'Environments/$(Environments)'
        environmentServiceName: 'MyExample-Azure'
        commandOptions: '-var-file=terraform.tfvars -out=tfplan'

    # Publish Plan Artifact
    - publish: Environments/$(Environments)/tfplan
      artifact: deploy_artifact

# -------------------------
# STAGE 2: APPLY
# -------------------------
- stage: Apply
  displayName: "Terraform Apply - Dev"
  dependsOn: Plan
  condition: succeeded()

  jobs:
  - deployment: terraform_apply
    displayName: "Apply Infrastructure"
    environment: $(Environments)

    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          # Install Terraform
          - task: ms-devlabs.custom-terraform-tasks.custom-terraform-installer-task.TerraformInstaller@1
            inputs:
              terraformVersion: $(TF_VERSION)

          # Download Plan Artifact
          - download: current
            artifact: deploy_artifact

          # Terraform Init
          - task: charleszipp.azure-pipelines-tasks-terraform.azure-pipelines-tasks-terraform-cli.TerraformCLI@1
            displayName: "Terraform Init"
            inputs:
              command: 'init'
              workingDirectory: 'Environments/$(Environments)'
              backendType: 'azurerm'
              backendServiceArm: 'MyExample-Azure'

          # Terraform Apply using saved plan
          - task: charleszipp.azure-pipelines-tasks-terraform.azure-pipelines-tasks-terraform-cli.TerraformCLI@1
            displayName: "Terraform Apply"
            inputs:
              command: 'apply'
              workingDirectory: 'Environments/$(Environments)'
              environmentServiceName: 'MyExample-Azure'
              commandOptions: '$(Pipeline.Workspace)/deploy_artifact/tfplan'
