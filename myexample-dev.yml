trigger:
  branches:
    include:
      - main

variables:
- group: myexample-iac-terraform-dev   # Azure DevOps Variable Group

- name: TF_VERSION
  value: '1.6.6'

- name: Environments
  value: 'dev'

stages:

# -------------------------
# STAGE 1: VALIDATE + PLAN
# -------------------------
- stage: Plan
  displayName: "Terraform Plan - dev"
  jobs:
  - job: terraform_plan
    displayName: "Run Terraform Plan"
    pool:
      vmImage: 'ubuntu-latest'
    
    steps:
    - checkout: self

    # Install Terraform
    - task: charleszipp.azure-pipelines-tasks-terraform.azure-pipelines-tasks-terraform-installer.TerraformInstaller@1
      inputs:
        terraformVersion: $(TF_VERSION)

    # Azure Login
    - task: AzureCLI@2
      displayName: "Azure Login"
      inputs:
        azureSubscription: 'MyExample-Azure'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az account show
          az group create --location eastus --name myexample-tf-rg
          az storage account create --name myexampletfstorage --resource-group myexample-tf-rg --location eastus --sku Standard_ZRS --encryption-services blob
          az storage container create --account-name myexampletfstorage --name myexample-dev-tfstate

    # Terraform Init
    - script: |
        terraform init
      displayName: "Terraform Init"
      workingDirectory: Environments/$(Environments)

    # Terraform Format Check
    - script: terraform fmt -check
      displayName: "Terraform Format Check"
      workingDirectory: Environments/$(Environments)

    # Terraform Validate
    - script: terraform validate
      displayName: "Terraform Validate"
      workingDirectory: Environments/$(Environments)

    # Terraform Plan
    - script: |
        terraform plan \
          -var-file=terraform.tfvars \
          -out=tfplan
      displayName: "Terraform Plan"
      workingDirectory: Environments/$(Environments)

    # Publish Plan Artifact
    - publish: Environments/$(Environments)/tfplan
      artifact: deploy_artifact

# -------------------------
# STAGE 2: APPLY
# -------------------------
- stage: Apply
  displayName: "Terraform Apply - Dev"
  dependsOn: Plan
  condition: succeeded()

  jobs:
  - deployment: terraform_apply
    displayName: "Apply Infrastructure"
    environment: $(Environments)

    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          # Install Terraform
          - task: charleszipp.azure-pipelines-tasks-terraform.azure-pipelines-tasks-terraform-installer.TerraformInstaller@1
            inputs:
              terraformVersion: $(TF_VERSION)

          # Azure Login
          - task: AzureCLI@2
            displayName: "Azure Login"
            inputs:
              azureSubscription: 'MyExample-Azure'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az account show
                az group create --location eastus --name $(tf_resource_group_name)
                az storage account create --name $(tf_storage_name) --resource-group $(tf.resourcegroupname) --location $(tf_storage_location) --sku Standard_ZRS --encryption-services blob
                az storage container create --account-name $(tf_storage_name) --name $(tf_storage_container_name)

          # Download Plan Artifact
          - download: current
            artifact: deploy_artifact

          # Terraform Init
          - script: |
              terraform init
            displayName: "Terraform Init"
            workingDirectory: Environments/$(Environments)

          # Terraform Apply using saved plan
          - script: |
              terraform apply -auto-approve $(Pipeline.Workspace)/deploy_artifact/tfplan
            displayName: "Terraform Apply"
            workingDirectory: Environments/$(Environments)
