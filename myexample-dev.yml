trigger:
  branches:
    include:
      - dev      
pr:
  branches:
    include:
      - dev
pool:
  vmImage: 'ubuntu-latest'

variables:
- group: myexample-iac-terraform-dev

stages:
- stage: Build
  displayName: 'Build terraform code'
  jobs:
    - job: BuildJob
      steps: 
        - task: CopyFiles@2
          displayName: 'Copy all repository contents to artifacts'
          inputs:
            SourceFolder: '$(System.DefaultWorkingDirectory)' # This targets the root of your repository
            Contents: '**' # Copies absolutely everything inside the root
            TargetFolder: '$(Build.ArtifactStagingDirectory)' # Fixed path to ensure it matches the publish task!

        - task: PublishBuildArtifacts@1
          displayName: 'Publish Terraform Artifacts'
          inputs:
            PathtoPublish: '$(Build.ArtifactStagingDirectory)'
            artifactName: 'terraform_drop'

- stage: Plan
  displayName: 'Terraform Plan'
  dependsOn: Build
  jobs:
    - job: Bootstrap
      displayName: 'Bootstrap Azure Resources'
      pool:
        vmImage: 'windows-latest'
      steps:
        - task: AzureCLI@2
          displayName: 'Ensure Backend Storage Exists'
          inputs:
            azureSubscription: '$(AzureServiceConnectionName)'
            scriptType: pscore
            scriptLocation: inlineScript
            inlineScript: |
              # Only create RG if it doesn't already exist
              if (-not (az group show --name $(tf_resource_group_name) 2>$null)) {
                az group create --location $(tf_storage_location) --name $(tf_resource_group_name)
              } else { Write-Host "Resource group already exists, skipping." }

              az provider register --namespace Microsoft.Storage --subscription $(subscription_id) --wait

              # Only create storage account if it doesn't already exist
              if (-not (az storage account show --name $(tf_storage_name) --resource-group $(tf_resource_group_name) 2>$null)) {
                az storage account create --name $(tf_storage_name) --resource-group $(tf_resource_group_name) --location $(tf_storage_location) --sku Standard_LRS --encryption-services blob --subscription $(subscription)
              } else { Write-Host "Storage account already exists, skipping." }

              # Only create container if it doesn't already exist
              if (-not (az storage container show --account-name $(tf_storage_name) --name $(tf_storage_container_name) --auth-mode login 2>$null)) {
                az storage container create --account-name $(tf_storage_name) --name $(tf_storage_container_name) --auth-mode login --subscription $(subscription)
              } else { Write-Host "Container already exists, skipping." }

    - job: Terraform_Plan
      displayName: 'Terraform Plan'
      dependsOn: Bootstrap
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - download: current
          artifact: terraform_drop

        - task: AzureCLI@2
          displayName: 'Terraform Init & Plan'
          inputs:
            azureSubscription: '$(AzureServiceConnectionName)'
            scriptType: bash
            scriptLocation: inlineScript
            addSpnToEnvironment: true
            inlineScript: |
              set -e

              # Install Terraform
              wget -q https://releases.hashicorp.com/terraform/1.6.6/terraform_1.6.6_linux_amd64.zip
              unzip -o terraform_1.6.6_linux_amd64.zip
              sudo mv terraform /usr/local/bin/terraform
              terraform version

              # Set ARM authentication env vars (WIF / OIDC)
              export ARM_CLIENT_ID="$servicePrincipalId"
              export ARM_TENANT_ID="$tenantId"
              export ARM_OIDC_TOKEN="$idToken"
              export ARM_USE_OIDC=true
              export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
              export ARM_SKIP_PROVIDER_REGISTRATION=true

              # Run Terraform
              TF_DIR=$(find $(Pipeline.Workspace)/terraform_drop/Environments -maxdepth 1 -iname "dev" -type d | head -1)
              echo "Terraform directory: $TF_DIR"
              cd "$TF_DIR"
              terraform init \
                -backend-config="storage_account_name=$(tf_storage_name)" \
                -backend-config="container_name=$(tf_storage_container_name)" \
                -backend-config="key=$(tf_storage_key)" \
                -backend-config="resource_group_name=$(tf_resource_group_name)"

              terraform plan -var-file=terraform.tfvars -out=tfplan

- stage: Apply
  displayName: 'Terraform Apply'
  dependsOn: Plan
  condition: and(succeeded(), in(variables['Build.SourceBranch'], 'refs/heads/dev'), ne(variables['Build.Reason'], 'PullRequest'))
  jobs:
    - job: Terraform_Apply
      displayName: 'Terraform Apply'
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - download: current
          artifact: terraform_drop

        - task: AzureCLI@2
          displayName: 'Terraform Init & Apply'
          inputs:
            azureSubscription: '$(AzureServiceConnectionName)'
            scriptType: bash
            scriptLocation: inlineScript
            addSpnToEnvironment: true
            inlineScript: |
              set -e

              # Install Terraform
              wget -q https://releases.hashicorp.com/terraform/1.6.6/terraform_1.6.6_linux_amd64.zip
              unzip -o terraform_1.6.6_linux_amd64.zip
              sudo mv terraform /usr/local/bin/terraform

              # Set ARM authentication env vars (WIF / OIDC)
              export ARM_CLIENT_ID="$servicePrincipalId"
              export ARM_TENANT_ID="$tenantId"
              export ARM_OIDC_TOKEN="$idToken"
              export ARM_USE_OIDC=true
              export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
              export ARM_SKIP_PROVIDER_REGISTRATION=true

              # Run Terraform
              TF_DIR=$(find $(Pipeline.Workspace)/terraform_drop/Environments -maxdepth 1 -iname "dev" -type d | head -1)
              cd "$TF_DIR"
              terraform init \
                -backend-config="storage_account_name=$(tf_storage_name)" \
                -backend-config="container_name=$(tf_storage_container_name)" \
                -backend-config="key=$(tf_storage_key)" \
                -backend-config="resource_group_name=$(tf_resource_group_name)"

              terraform apply -auto-approve -var-file=terraform.tfvars
